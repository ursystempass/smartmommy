<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - SmartMom</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/profile.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<aside class="sidebar">

    <div class="menu">
        <div class="logo">
            <img src="../assets/Logo_smartmom-removebg-preview.png">
            <h3>SmartMom</h3>
        </div>
        
        <a href="homepage.html" class="menu-item">
            <img src="../assets/icon home.png">
            <span>Dashboard</span>
        </a>

        <a href="calcullator-input.html" class="menu-item">
            <img src="../assets/icon kalku.png">
            <span>Kalkulator</span>
        </a>

        <a href="reminder.html" class="menu-item">
            <img src="../assets/icon reminderr.png">
            <span>Reminder</span>
        </a>

        <a href="timeline.html" class="menu-item">
            <img src="../assets/icon artikell.png">
            <span>Timeline</span>
        </a>

        <a href="profile.html" class="menu-item active">
            <img src="../assets/profile icon.png">
            <span>Profile</span>
        </a>
    </div>

    <div class="bottom">
        <a class="menu-item logout">
            <img src="../assets/logout.png">
            <span>Log Out</span>
        </a>
    </div>

</aside>

<div class="profile-container">

    <div class="profile-card">

        <div class="profile-left">
            <img src="../assets/profile icon.png" class="profile-img" id="fotoProfile">
            <button class="btn-main" id="btnFoto">Ganti Foto</button>
            <input type="file" id="uploadFoto" hidden>
        </div>

        <div class="profile-right">

            <h2>Profile Mom 👩‍🍼</h2>

            <div class="profile-fields">

                <div class="profile-field">
                    <label>Nama</label>
                    <input type="text" id="nama">
                </div>

                <div class="profile-field">
                    <label>Email</label>
                    <input type="text" id="email">
                </div>

                <div class="profile-field">
                    <label>Nama Anak</label>
                    <input type="text" id="namaAnak">
                </div>

                <div class="profile-field">
                    <label>Usia Anak</label>
                    <input type="text" id="usiaAnak" disabled>
                </div>

                <div class="profile-field">
                    <label>Total Reminder</label>
                    <input type="text" id="totalReminder" disabled>
                </div>

                <div class="profile-field">
                    <label>Reminder Selesai</label>
                    <input type="text" id="reminderSelesai" disabled>
                </div>

            </div>

           <button class="btn-main" id="btnSimpan">Simpan</button>

        </div>

    </div>

</div>

<script src="../js/sidebar.js"></script>
<script src="../js/profile.js"></script>

</body>
</html>
