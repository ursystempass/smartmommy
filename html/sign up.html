<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SmartMom Register</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>

    <link rel="stylesheet" href="../css/signup.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="signup-bg min-h-screen flex items-center justify-center">

    <div class="logo-box">
        <img src="../assets/Logo_smartmom-removebg-preview.png"> <span>SmartMom</span>
    </div>

    <div class="outer-card">

        <h1 class="title">Buat Akun Baru</h1>
        <p class="subtitle">Mulai perjalanan sehat si kecil hari ini</p>

        <div class="inner-card">

            <form id="registerForm">

                <label>Nama Lengkap</label>
                <input type="text" id="nama" class="input">

                <label>Email</label>
                <input type="email" id="email" class="input">

                <label>Password</label>

                <div class="password-field">

                    <input type="password" id="password" class="input">

                    <button type="button" onclick="togglePassword()" class="show-pass">
                        <i data-feather="eye" id="eyeIcon"></i>
                    </button>

                </div>

                <button type="submit" class="btn-daftar">
                    Daftar
                </button>

                <p class="login-text">
                    Sudah punya akun?
                    <a href="/html/sign in.html">Masuk</a>
                </p>

            </form>

        </div>
    </div>

    <div id="popupRegister" class="popup-overlay">

        <div class="popup-card">

            <div class="popup-icon">✓</div>

            <h3>Akun berhasil dibuat</h3>

            <p>Silakan login untuk melanjutkan</p>

            <button onclick="goToLogin()" class="popup-btn">
                Login Sekarang
            </button>

        </div>
    </div>
    <script src="../js/signup.js"></script>

    <div id="successPopup" class="popup-overlay">
        <div class="popup-box">
            <div class="icon">✔</div>
            <h3>Registrasi Berhasil!</h3>
            <p>Akun kamu sudah dibuat 🎉</p>
            <button onclick="goToLogin()">Lanjut ke Login</button>
        </div>
    </div>

</body>

</html>
