<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartMom Register</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/feather-icons"></script>

<!-- CSS -->
<link rel="stylesheet" href="/smartmom/css/sign up.css">

</head>

<body class="signup-bg min-h-screen flex items-center justify-center">

<!-- Logo -->
<div class="logo-box">
    <img src="/smartmom/assets/Logo_smartmom-removebg-preview.png">
    <span>SmartMom</span>
</div>

<!-- Card -->
<div class="outer-card">

<h1 class="title">Buat Akun Baru</h1>
<p class="subtitle">Mulai perjalanan sehat si kecil hari ini</p>

<div class="inner-card">

<form>

<label>Nama Lengkap</label>
<input type="text" class="input">

<label>Email</label>
<input type="email" class="input">

<label>Password</label>

<div class="password-field">
    <input type="password" id="password" class="input">

    <button type="button" onclick="togglePassword()" class="show-pass">
        <i data-feather="eye" id="eyeIcon"></i>
    </button>
</div>

<button type="submit" class="btn-daftar">
Daftar
</button>

<p class="login-text">
Sudah punya akun?
<a href="/html/sign in.html">Masuk</a>
</p>

</form>

</div>

</div>

<script src="https://unpkg.com/feather-icons"></script>

<script>
feather.replace()
</script>
</body>
</html>
