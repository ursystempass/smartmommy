<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <title>Tambah Reminder</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="../css/calcullator-input.css">
    <link rel="stylesheet" href="../css/sidebar.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-200">

    <div class="flex">

        <aside class="sidebar">

            <div class="menu">

                <nav class="navbar">
                    <div class="logo">
                        <img src="../assets/Logo_smartmom-removebg-preview.png">
                        <h3>SmartMom</h3>
                    </div>
                </nav>

                <a href="homepage.html" class="menu-item">
                    <img src="../assets/icon home.png">
                    <span>Dashboard</span>
                </a>

                <a href="calcullator-input.html" class="menu-item">
                    <img src="../assets/icon kalku.png">
                    <span>Kalkulator</span>
                </a>

                <a href="reminder.html" class="menu-item">
                    <img src="../assets/icon reminderr.png">
                    <span>Reminder</span>
                </a>

                <a href="timeline.html" class="menu-item">
                    <img src="../assets/icon artikell.png">
                    <span>Timeline</span>
                </a>

                <a href="profile.html" class="menu-item">
                    <img src="../assets/profile icon.png">
                    <span>Profile</span>
                </a>

            </div>

            <div class="bottom">
                <a class="menu-item logout">
                    <img src="../assets/logout.png">
                    <span>Log Out</span>
                </a>
            </div>

        </aside>

        <div class="flex-1 px-10">

            <h2 class="text-xl font-semibold mb-6">
                Tambah Pengingat
            </h2>

            <div class="form-card">

                <label>Kategori</label>

                <select id="kategori" class="input">
                    <option value="imunisasi">Imunisasi</option>
                    <option value="mpasi">MPASI</option>
                    <option value="kontrol">Cek Kontrol</option>
                </select>

                <label class="mt-3">Tanggal</label>
                <input type="date" id="tanggal" class="input">

                <label class="mt-3">Judul</label>
                <input type="text" id="judul" class="input">

                <label class="mt-3">Keterangan</label>
                <input type="text" id="keterangan" class="input">

            </div>

            <div class="flex justify-center mt-10">

                <button id="simpanReminder" class="btn-main">
                    Simpan Reminder
                </button>

            </div>

        </div>

    </div>

    <script src="../js/reminder-input.js"></script>

</body>

</html>
